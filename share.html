<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share an Article</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 14px 48px;
        }

        .page-shell { max-width: 520px; margin: 0 auto; }

        .page-header {
            background: white;
            border-radius: 16px;
            padding: 20px 24px 16px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .back-link { font-size: 0.82em; color: #667eea; text-decoration: none; display: inline-block; margin-bottom: 8px; }
        .back-link:hover { text-decoration: underline; }
        h1 { font-size: 1.5em; color: #667eea; margin-bottom: 2px; }
        .subtitle { color: #777; font-size: 0.88em; }

        .form-box, .done-box {
            background: white; border-radius: 16px; padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        label { display: block; font-size: 0.82em; font-weight: 600; color: #555; margin-bottom: 5px; }
        input[type=url], textarea {
            width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 7px;
            font-size: 0.92em; font-family: inherit; color: #333; margin-bottom: 14px;
        }
        textarea { resize: vertical; min-height: 60px; }
        input[type=url]:focus, textarea:focus { outline: none; border-color: #667eea; }

        .btn {
            padding: 12px 22px; border-radius: 8px; font-size: 0.92em;
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; width: 100%; padding: 13px; }
        .btn-primary:hover { background: #5568d3; }
        .btn-primary:disabled { background: #bbb; cursor: not-allowed; }

        .status-msg { font-size: 0.82em; margin-top: 10px; color: #666; }
        .status-msg.error   { color: #c62828; }
        .status-msg.success { color: #2e7d32; }

        .done-box { text-align: center; }
        .done-box h2 { color: #43a047; margin-bottom: 8px; }
        .done-box p { color: #666; margin-bottom: 12px; }

        .error-box {
            background: white; border-radius: 12px; padding: 24px;
            text-align: left; color: #c62828; border-left: 4px solid #e53935;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="page-shell">

    <div class="page-header">
        <a href="index.html" class="back-link">← Back to feeds</a>
        <h1>📨 Share an Article</h1>
        <p class="subtitle">Found something good elsewhere? Drop the link here — it'll be used to tune scoring and check for a new source.</p>
    </div>

    <div id="error-msg" class="error-box" style="display:none"></div>

    <div id="form-section">
        <div class="form-box">
            <label for="url-input">Article URL</label>
            <input type="url" id="url-input" placeholder="https://example.com/article" required>

            <label for="note-input">Note (optional)</label>
            <textarea id="note-input" maxlength="200" placeholder="Why you liked it…"></textarea>

            <button class="btn btn-primary" id="submit-btn" onclick="submitShare()">💾 Share</button>
            <div class="status-msg" id="submit-status"></div>
        </div>
    </div>

    <div id="done-section" style="display:none; margin-bottom:14px;">
        <div class="done-box">
            <h2>✅ Shared!</h2>
            <p>It'll be scored and folded into next week's tuning run.</p>
            <button class="btn btn-primary" onclick="resetForm()">Share Another</button>
        </div>
    </div>

</div>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const REPO_OWNER  = 'zirnhelt';
const REPO_NAME   = 'super-rss-feed';
const BAKED_TOKEN = (() => { const e = 'WuR3mk1Y5YEAMCRWwHJSncr33cc1azIySYUWLCRxnY8vP2S5UuX6xsAiQyn_Vq368K4FDfza0ACOT2BA11_tap_buhtig'; return e.startsWith('__') ? null : e.split('').reverse().join(''); })();

function getTodayKey() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Vancouver' });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    if (!BAKED_TOKEN) {
        showError('Token not substituted — open this page via the deployed GitHub Pages site, not directly from the repo.');
        return;
    }
    // Prefill from share-sheet / bookmarklet query params
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (url) document.getElementById('url-input').value = url;
});

function resetForm() {
    document.getElementById('url-input').value = '';
    document.getElementById('note-input').value = '';
    document.getElementById('submit-status').textContent = '';
    hide('done-section');
    show('form-section');
}

// ── GitHub submission ─────────────────────────────────────────────────────────
async function submitShare() {
    const urlInput  = document.getElementById('url-input');
    const noteInput = document.getElementById('note-input');
    const statusEl  = document.getElementById('submit-status');
    const btn       = document.getElementById('submit-btn');

    const url = urlInput.value.trim();
    statusEl.className = 'status-msg';

    let parsed;
    try {
        parsed = new URL(url);
        if (!/^https?:$/.test(parsed.protocol)) throw new Error('not http(s)');
    } catch {
        statusEl.className = 'status-msg error';
        statusEl.textContent = 'Enter a valid http(s) URL.';
        return;
    }

    btn.disabled = true;
    statusEl.textContent = 'Saving to GitHub…';

    const todayKey = getTodayKey();
    const share = {
        url:           parsed.toString(),
        note:          noteInput.value.trim() || null,
        submitted_at:  new Date().toISOString(),
    };

    const filePath = `shared_articles/${todayKey}.json`;
    const apiBase  = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;
    const headers  = {
        'Authorization':        `Bearer ${BAKED_TOKEN}`,
        'Content-Type':         'application/json',
        'Accept':               'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
    };

    try {
        let sha = null;
        let existingShares = [];
        const existing = await fetch(apiBase, { headers });
        if (existing.ok) {
            const existingData = await existing.json();
            sha = existingData.sha;
            try {
                const decoded = JSON.parse(atob(existingData.content.replace(/\n/g, '')));
                existingShares = decoded.shares || [];
            } catch {}
        }

        const existingByUrl = Object.fromEntries(existingShares.map(s => [s.url, s]));
        existingByUrl[share.url] = share;

        const payload = {
            date:         todayKey,
            submitted_at: new Date().toISOString(),
            shares:       Object.values(existingByUrl),
        };

        const body = {
            message: `Add shared article ${todayKey} [skip ci]`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
            ...(sha ? { sha } : {}),
        };

        const putRes = await fetch(apiBase, { method: 'PUT', headers, body: JSON.stringify(body) });
        if (!putRes.ok) {
            const err = await putRes.json().catch(() => ({}));
            throw new Error(err.message || `HTTP ${putRes.status}`);
        }

        statusEl.className = 'status-msg success';
        statusEl.textContent = '✅ Saved!';
        hide('form-section');
        show('done-section');

    } catch (e) {
        statusEl.className = 'status-msg error';
        statusEl.textContent = '❌ Save failed: ' + e.message;
    } finally {
        btn.disabled = false;
    }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    show('error-msg');
    hide('form-section');
}
function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }
function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
</script>
</body>
</html>
