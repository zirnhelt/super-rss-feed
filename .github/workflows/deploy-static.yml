name: Deploy Static Files

on:
  push:
    branches: [main]
    paths:
      - 'review.html'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bake token and stage static files
        env:
          REVIEW_PAT: ${{ secrets.REVIEW_PAT }}
        run: |
          mkdir -p output
          REVERSED_TOKEN=$(echo "$REVIEW_PAT" | rev)
          sed "s|__BAKED_GH_TOKEN__|${REVERSED_TOKEN}|g" review.html > output/review.html

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
