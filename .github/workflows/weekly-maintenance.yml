name: Weekly Quality & Reporting

on:
  schedule:
    # Sundays at 1:00 PM UTC
    - cron: '0 13 * * 0'
  workflow_dispatch:
    inputs:
      run_discovery:
        description: 'Run feed discovery (find & auto-add new feeds)'
        type: boolean
        default: true
      run_calibration:
        description: 'Run the calibration agent (tune config from 14-day stats)'
        type: boolean
        default: true
      calibration_dry_run:
        description: 'Calibration: analyze and log only, do not write config changes'
        type: boolean
        default: false
      run_shared_articles:
        description: 'Process shared articles (score + feed-probe links submitted via share.html)'
        type: boolean
        default: true
      shared_articles_dry_run:
        description: 'Shared articles: analyze and log only, do not write feedback/OPML changes'
        type: boolean
        default: false
      run_feedback_training:
        description: 'Run the feedback trainer (process user article ratings)'
        type: boolean
        default: true
      feedback_dry_run:
        description: 'Feedback trainer: analyze and log only, do not write config changes'
        type: boolean
        default: false
      run_quality_review:
        description: 'Run quality review (score/scrub + corpus alignment reports)'
        type: boolean
        default: true
      run_report:
        description: 'Generate and publish the consolidated weekly report'
        type: boolean
        default: true
      run_filter_review:
        description: 'Run filter/priority code review (Cohere code review of pipeline logic)'
        type: boolean
        default: true
      max_candidates:
        description: 'Override max new discovery candidates per run for gated sources (e.g. Kagi Small Web). Leave empty to use the config default.'
        required: false
        type: string

concurrency:
  group: weekly-maintenance
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discovery:
    name: Feed Discovery
    if: ${{ github.event_name == 'schedule' || inputs.run_discovery }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed discovery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          DISCOVERY_MAX_NEW_CANDIDATES_PER_RUN: ${{ inputs.max_candidates }}
        run: python feed_discovery.py

      - name: Auto-add high-confidence feeds to OPML
        run: |
          python integrate_discoveries.py --auto-add-threshold 65 \
            --summary-file discovery_summary.md \
            --actions-file discovery_actions.json

      - name: Create Pull Request with discoveries
        id: cpr
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Weekly feed discoveries'
          title: '🔍 Weekly Feed Discovery Report'
          body-path: discovery_summary.md
          branch: feed-discovery
          delete-branch: true

      - name: Auto-merge discovery PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch

      - name: Upload discovery report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-discovery-report
          path: |
            feed_discovery_report.json
            discovery_cache.json
            discovery_actions.json
          retention-days: 30

  calibration:
    name: Calibration Agent
    needs: discovery
    if: always() && (github.event_name == 'schedule' || inputs.run_calibration)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calibration agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CALIBRATION_DRY_RUN: ${{ inputs.calibration_dry_run && 'true' || 'false' }}
        run: python calibration_agent.py

      - name: Commit calibration results to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/limits.json config/podcast_schedule.json calibration_memory/ CALIBRATION_LOG.md
          git diff --cached --quiet || git commit -m "Weekly calibration agent run [skip ci]"
          git pull --rebase --autostash origin main
          git push

  shared-articles:
    name: Shared Article Processor
    needs: calibration
    if: always() && (github.event_name == 'schedule' || inputs.run_shared_articles)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run shared article processor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SHARED_ARTICLES_DRY_RUN: ${{ inputs.shared_articles_dry_run && 'true' || 'false' }}
        run: python process_shared_articles.py

      - name: Commit shared article results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared_articles_cache.json shared_source_candidates.json feeds.opml feedback/ SHARED_ARTICLES_LOG.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Weekly shared article processing run [skip ci]"
          git pull --rebase --autostash origin main
          git push
        continue-on-error: true

  feedback-training:
    name: Feedback Trainer
    needs: [calibration, shared-articles]
    if: always() && (github.event_name == 'schedule' || inputs.run_feedback_training)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feedback trainer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEEDBACK_DRY_RUN: ${{ inputs.feedback_dry_run && 'true' || 'false' }}
        run: python feedback_trainer.py

      - name: Commit training results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/feedback_examples.txt FEEDBACK_TRAINING_LOG.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Weekly feedback training run [skip ci]"
          git pull --rebase --autostash origin main
          git push
        continue-on-error: true

  quality-review:
    name: Quality Review
    needs: [calibration, feedback-training]
    if: always() && (github.event_name == 'schedule' || inputs.run_quality_review)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download current feeds from GitHub Pages
        run: |
          BASE="https://zirnhelt.github.io/super-rss-feed"
          TS="$(date +%s)"
          download_json() {
            local url="$1"
            local dest="$2"
            local tmp="${dest}.tmp"
            # Use cache-busting query param + no-cache headers so the CDN always
            # returns the freshest published file rather than a stale cached copy.
            if curl -sSf --max-time 30 \
                  -H "Cache-Control: no-cache" \
                  -H "Pragma: no-cache" \
                  "${url}?v=${TS}" -o "$tmp" \
               && python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$tmp" 2>/dev/null; then
              mv "$tmp" "$dest"
              echo "  ✓ $dest"
            else
              rm -f "$tmp"
              echo "  ✗ $dest (unavailable — will review repo copy if present)"
            fi
          }
          for feed in local ai-tech climate homelab wellness news science scifi; do
            download_json "${BASE}/feed-${feed}.json" "feed-${feed}.json"
          done
        continue-on-error: true

      - name: Run scoring and scrubbing review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python score_scrub_report.py --json-summary score_scrub_summary.json

      - name: Run corpus alignment review
        run: python corpus_alignment_report.py --json-summary corpus_alignment_summary.json

      - name: Run article review audit
        run: python article_review_audit.py --json-summary article_review_audit_summary.json

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feed-review-${{ github.run_id }}
          path: |
            FEED_REVIEW_*.md
            CORPUS_ALIGNMENT_REPORT_*.md
            ARTICLE_REVIEW_AUDIT_*.md
            score_scrub_summary.json
            corpus_alignment_summary.json
            article_review_audit_summary.json
          retention-days: 30

      - name: Commit reports to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FEED_REVIEW_*.md CORPUS_ALIGNMENT_REPORT_*.md ARTICLE_REVIEW_AUDIT_*.md article_review_audit_summary.json
          git diff --cached --quiet || git commit -m "Add feed review, corpus alignment, and article review audit reports [skip ci]"
          git pull --rebase --autostash origin main
          git push

  filter-review:
    name: Filter & Priority Code Review
    needs: [calibration, feedback-training]
    if: always() && (github.event_name == 'schedule' || inputs.run_filter_review)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cohere

      - name: Run filter & priority review
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python tools/review_filter_priority.py --fail-on-blocking
        continue-on-error: true

      - name: Commit findings to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/filter_priority_review.md
          git diff --staged --quiet || git commit -m "Update filter/priority review findings [skip ci]"
          git pull --rebase --autostash origin main
          git push

      - name: Upload filter review as artifact
        uses: actions/upload-artifact@v4
        with:
          name: filter-priority-review
          path: tools/filter_priority_review.md
          retention-days: 30

  report:
    name: Weekly Report
    needs: [discovery, calibration, feedback-training, quality-review, filter-review]
    if: always() && (github.event_name == 'schedule' || inputs.run_report)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # Enough history to diff feeds.opml across the past 7 days
          fetch-depth: 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download quality review artifacts
        if: needs.quality-review.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: feed-review-${{ github.run_id }}
        continue-on-error: true

      - name: Download discovery actions artifact
        if: needs.discovery.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: feed-discovery-report
        continue-on-error: true

      - name: Download filter review artifact
        if: needs.filter-review.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: filter-priority-review
          path: tools/
        continue-on-error: true

      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_weekly_report.py

      - name: Commit report files to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly-state-article.json weekly-report-*.html
          git diff --cached --quiet || git commit -m "Add weekly state-of-the-feed report [skip ci]"
          git pull --rebase --autostash origin main
          git push

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Add weekly state-of-the-feed report'
