name: Discover New Feeds

on:
  schedule:
    # Run every Sunday at 2 AM Pacific (10 AM UTC)
    - cron: '0 10 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-feeds:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run feed discovery
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      run: |
        python feed_discovery.py

    - name: Auto-add high-confidence feeds to OPML
      run: |
        python integrate_discoveries.py --auto-add-threshold 75 --summary-file discovery_summary.md

    - name: Create Pull Request with discoveries
      id: cpr
      if: success()
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'Weekly feed discoveries'
        title: '🔍 Weekly Feed Discovery Report'
        body-path: discovery_summary.md
        branch: feed-discovery
        delete-branch: true

    - name: Auto-merge discovery PR
      if: steps.cpr.outputs.pull-request-number
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch

    - name: Upload discovery report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: feed-discovery-report
        path: |
          feed_discovery_report.json
          discovery_cache.json
        retention-days: 30
