name: Review Filter & Priority Logic

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - super_rss_curator_json.py
      - tools/review_filter_priority.py

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cohere

      - name: Run filter & priority review
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python tools/review_filter_priority.py
