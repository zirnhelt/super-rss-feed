name: Feed Scoring & Scrubbing Review

on:
  workflow_dispatch:
    inputs:
      no_scrub:
        description: 'Skip Claude scrub pass (stats only, no API cost)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download current feeds from GitHub Pages
        run: |
          BASE="https://zirnhelt.github.io/super-rss-feed"
          TS="$(date +%s)"
          download_json() {
            local url="$1"
            local dest="$2"
            local tmp="${dest}.tmp"
            # Use cache-busting query param + no-cache headers so the CDN always
            # returns the freshest published file rather than a stale cached copy.
            if curl -sSf --max-time 30 \
                  -H "Cache-Control: no-cache" \
                  -H "Pragma: no-cache" \
                  "${url}?v=${TS}" -o "$tmp" \
               && python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$tmp" 2>/dev/null; then
              mv "$tmp" "$dest"
              echo "  ✓ $dest"
            else
              rm -f "$tmp"
              echo "  ✗ $dest (unavailable — will review repo copy if present)"
            fi
          }
          for feed in local ai-tech climate homelab news science scifi; do
            download_json "${BASE}/feed-${feed}.json" "feed-${feed}.json"
          done
        continue-on-error: true

      - name: Run scoring and scrubbing review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.no_scrub }}" = "true" ]; then
            python score_scrub_report.py --no-scrub
          else
            python score_scrub_report.py
          fi

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-review-${{ github.run_id }}
          path: FEED_REVIEW_*.md
          retention-days: 30

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FEED_REVIEW_*.md
          git diff --staged --quiet || git commit -m "Add feed review report [skip ci]"
          git push
