name: Cleanup Stale Branches

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale claude/ branches with no open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          GIT_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          echo "Fetching all claude/ branches..."
          branches=$(git ls-remote --heads "$GIT_URL" "refs/heads/claude/*" | \
            awk '{print $2}' | sed 's|refs/heads/||')

          if [ -z "$branches" ]; then
            echo "No claude/ branches found."
            exit 0
          fi

          for branch in $branches; do
            if ! open_prs=$(gh pr list --repo "$REPO" --head "$branch" \
                --state open --json number --jq 'length' 2>&1); then
              echo "  Warning: could not check PRs for ${branch} — skipping."
              continue
            fi

            if [ "$open_prs" = "0" ]; then
              echo "Deleting ${branch} (no open PRs)"
              git push "$GIT_URL" --delete "$branch" && \
                echo "  Deleted." || echo "  Failed to delete (may already be gone)."
            else
              echo "Keeping ${branch} (${open_prs} open PR(s))"
            fi
          done
