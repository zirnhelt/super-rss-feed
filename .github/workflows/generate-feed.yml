name: Generate Super RSS Feed

on:
  schedule:
    # Run 2 times daily for cumulative feed updates
    - cron: '30 12 * * *'  # 4:30 AM Pacific  (12:30 UTC)
    - cron: '30 4 * * *'   # 8:30 PM Pacific  (04:30 UTC next day)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download existing feeds from GitHub Pages
        run: |
          echo "Downloading existing feeds from gh-pages..."
          BASE="https://zirnhelt.github.io/super-rss-feed"

          # Download feed JSON files atomically: write to a temp file and only
          # replace the target if the download succeeds AND the content is valid JSON.
          # This prevents stale repository files or HTML error responses from being
          # used as feed state, which would cause the retention window to drop all
          # existing articles and leave feeds with only that run's new articles.
          download_json() {
            local url="$1"
            local dest="$2"
            local tmp="${dest}.tmp"
            if wget -q --timeout=30 "$url" -O "$tmp" 2>/dev/null \
               && python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$tmp" 2>/dev/null; then
              mv "$tmp" "$dest"
              echo "  ✓ $dest"
            else
              rm -f "$tmp"
              # Remove any stale repo file so the curator builds fresh for this category
              rm -f "$dest"
              echo "  ✗ $dest (download failed or invalid JSON — will build fresh)"
            fi
          }

          for feed in local ai-tech climate homelab news science scifi; do
            download_json "${BASE}/feed-${feed}.json" "feed-${feed}.json"
          done
          # Download themed podcast feeds
          for day in monday tuesday wednesday thursday friday saturday sunday; do
            download_json "${BASE}/feed-podcast-${day}.json" "feed-podcast-${day}.json"
          done
          # Download caches (non-critical — failures are fine)
          download_json "${BASE}/podcast_articles_cache.json"  "podcast_articles_cache.json"
          download_json "${BASE}/theme_scores_cache.json"      "theme_scores_cache.json"
          download_json "${BASE}/podcast_shown_cache.json"     "podcast_shown_cache.json"
          download_json "${BASE}/image_cache.json"             "image_cache.json"

          echo "Download complete. Feed sizes:"
          wc -l feed-*.json 2>/dev/null || echo "(no feed files yet)"
        continue-on-error: true
      
      - name: Generate RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          python super_rss_curator_json.py feeds.opml 2>&1 | tee /tmp/feed_output.txt

      - name: Log feed generation results
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python log_feed_results.py /tmp/feed_output.txt --slot manual
          else
            python log_feed_results.py /tmp/feed_output.txt
          fi
        continue-on-error: true
      
      - name: Copy files to output
        run: |
          echo "Files in current directory:"
          ls -la
          mkdir -p output

          # Copy all category feeds and podcast feeds
          cp feed-*.json output/

          # Copy website files
          cp index.html output/
          cp curated-feeds.opml output/

          # Copy cache files (for persistence between runs)
          cp scored_articles_cache.json output/
          cp shown_articles_cache.json output/
          cp wlt_cache.json output/
          cp podcast_articles_cache.json output/
          cp theme_scores_cache.json output/ 2>/dev/null || true
          cp podcast_shown_cache.json output/ 2>/dev/null || true
          cp image_cache.json output/ 2>/dev/null || true

          echo "Files in output directory:"
          ls -la output/

      - name: Commit cache and log files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scored_articles_cache.json wlt_cache.json shown_articles_cache.json podcast_articles_cache.json theme_scores_cache.json podcast_shown_cache.json
          git add FEED_LOG.md TODO.md 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update cache and feed log [skip ci]"
          git push
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'Update RSS feed'
