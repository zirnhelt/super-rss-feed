name: Corpus Alignment Review

on:
  schedule:
    # Sundays at 2:00 PM UTC — after weekly-report (13:15 UTC)
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alignment-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run corpus alignment report
        run: python corpus_alignment_report.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpus-alignment-report-${{ github.run_id }}
          path: CORPUS_ALIGNMENT_REPORT_*.md
          retention-days: 30

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CORPUS_ALIGNMENT_REPORT_*.md
          git diff --staged --quiet || git commit -m "Add corpus alignment report [skip ci]"
          git push
