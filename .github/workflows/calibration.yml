name: Weekly Calibration Agent

on:
  schedule:
    # Sundays at 2:00 PM UTC — after weekly-report (13:15 UTC)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (analyze and log, but do not write config changes)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  calibration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calibration agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CALIBRATION_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: python calibration_agent.py

      - name: Commit calibration results to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/limits.json config/podcast_schedule.json calibration_memory/ CALIBRATION_LOG.md
          git diff --cached --quiet || git commit -m "Weekly calibration agent run [skip ci]"
          git push
